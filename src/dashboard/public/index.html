<!DOCTYPE html>
<html lang="pt-MZ">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WhatsCommunityBoosterAI — Dashboard</title>
  <style>
    body { background:#0a0a0a; color:#fff; font-family:Arial,Helvetica,sans-serif; margin:0; padding:0; }
    .header { padding:20px; text-align:center; background:#075e54; position:relative; }
    .status { width:12px; height:12px; background:#25D366; border-radius:50%; display:inline-block; margin-left:10px; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity:1; } 50% { opacity:0.4; } 100% { opacity:1; } }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:10px; padding:20px; }
    .card { background:#1e1e1e; padding:16px; border-radius:8px; text-align:center; }
    .card strong { display:block; font-size:12px; color:#aaa; margin-bottom:6px; text-transform:uppercase; }
    .card span { font-size:28px; font-weight:700; color:#25D366; }
    table { width:100%; border-collapse:collapse; margin:0 20px 20px; width:calc(100% - 40px); }
    th, td { padding:10px; border:1px solid #333; text-align:left; font-size:13px; }
    th { background:#075e54; }
    .badge { padding:2px 8px; border-radius:99px; font-size:11px; font-weight:600; }
    .pending { background:#333; color:#aaa; }
    .sent { background:#1a2a3a; color:#4A9EFF; }
    .replied { background:#1a2a1a; color:#25D366; }
    .added { background:#1a3a1a; color:#4ade80; }
    .failed { background:#3a1a1a; color:#FF4444; }
    .refresh { font-size:11px; color:#555; text-align:right; padding:8px 20px; }
    h2 { padding:16px 20px 8px; font-size:14px; text-transform:uppercase; color:#aaa; letter-spacing:1px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>WhatsCommunityBoosterAI <span class="status"></span></h1>
  </div>
  <div class="refresh">Última actualização: <span id="lastUpdate">—</span></div>
  <div class="grid" id="stats"></div>
  <h2>Actividade Recente</h2>
  <div id="activity"></div>
  <h2>Contactos</h2>
  <div id="contacts"></div>

  <script>
    async function refresh() {
      try {
        const [sR, aR, cR] = await Promise.all([
          fetch('/api/stats'),
          fetch('/api/activity'),
          fetch('/api/contacts'),
        ]);
        const stats    = await sR.json();
        const activity = await aR.json();
        const contacts = await cR.json();

        document.getElementById('stats').innerHTML =
          '<div class="card"><strong>Total Contactos</strong><span>' + (stats.total_contacts || 0) + '</span></div>' +
          '<div class="card"><strong>Mensagens Hoje</strong><span>' + (stats.today.messages_sent || 0) + '</span></div>' +
          '<div class="card"><strong>Respostas Hoje</strong><span>' + (stats.today.replies || 0) + '</span></div>' +
          '<div class="card"><strong>Adicionados Hoje</strong><span>' + (stats.today.added || 0) + '</span></div>' +
          '<div class="card"><strong>Total Adicionados</strong><span>' + (stats.added || 0) + '</span></div>' +
          '<div class="card"><strong>Pendentes</strong><span>' + (stats.pending || 0) + '</span></div>';

        const actRows = activity.length ? activity.map(function(a) {
          return '<tr><td>' + new Date(a.created_at).toLocaleTimeString('pt-MZ') + '</td>' +
                 '<td>' + a.phone.replace('@s.whatsapp.net','') + '</td>' +
                 '<td>' + a.action.replace(/_/g,' ') + '</td>' +
                 '<td>' + (a.group_id || '—') + '</td></tr>';
        }).join('') : '<tr><td colspan="4" style="color:#555">Sem actividade</td></tr>';

        document.getElementById('activity').innerHTML =
          '<table><thead><tr><th>Hora</th><th>Número</th><th>Acção</th><th>Grupo</th></tr></thead><tbody>' + actRows + '</tbody></table>';

        const contRows = contacts.length ? contacts.map(function(c) {
          return '<tr><td>' + c.phone.replace('@s.whatsapp.net','') + '</td>' +
                 '<td>' + (c.name || '—') + '</td>' +
                 '<td>' + (c.group_name || '—') + '</td>' +
                 '<td><span class="badge ' + c.status + '">' + c.status + '</span></td>' +
                 '<td>' + new Date(c.updated_at).toLocaleString('pt-MZ') + '</td></tr>';
        }).join('') : '<tr><td colspan="5" style="color:#555">Sem contactos</td></tr>';

        document.getElementById('contacts').innerHTML =
          '<table><thead><tr><th>Número</th><th>Nome</th><th>Grupo</th><th>Estado</th><th>Actualizado</th></tr></thead><tbody>' + contRows + '</tbody></table>';

        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('pt-MZ');
      } catch(e) {
        console.error('Erro ao actualizar dashboard:', e);
      }
    }

    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
